voice:
  niche: indie hacker, design, solopreneurship
  product: Dodo Invoice, Iconstack
  product_url: https://dodoinvoice.com, https://iconstack.io
  personality: thoughtful, analytical, dry humor
  never_say:
  - consistency is key
  - the grind never stops
  - let's goooo
  - hustle hard
  - crush it
posting:
  tweets_per_day: 4
  require_approval: true
  auto_generate_tweets: false
  auto_generate_threads: false
  auto_generate_promos: false
  tweet_times:
  - 09:30
  - '19:00'
  active_hours_start: 09:00
  active_hours_end: '23:00'
autonomy_mode:
  enabled: true
  level: 60
ui:
  status_overlay_enabled: true
engagement:
  daily_replies: 40
  daily_follows: 10
  daily_dms: 4
  daily_likes: 45
  daily_retweets: 2
  min_delay_seconds: 15
  max_delay_seconds: 90
dynamic_limits:
  enabled: true
  daily_jitter_pct: 0.2
  delay_jitter_pct: 0.25
  hourly_jitter_pct: 0.2
  session_pause_jitter_pct: 0.25
tiers:
  small:
    min_followers: 0
    max_followers: 1000
    behavior: relationship
    comment_tone: warm, conversational, asks one genuine question
    dm_after_engagement: true
    dm_delay_min_minutes: 20
    dm_delay_max_minutes: 90
  peer:
    min_followers: 1000
    max_followers: 10000
    behavior: networking
    comment_tone: opinionated, adds a layer, treats as equal
    dm_after_engagement: true
  big:
    min_followers: 10000
    max_followers: 999999999
    behavior: visibility
    comment_tone: "sharp, specific, insightful \u2014 reply within 15 mins of post"
    dm_after_engagement: false
target_accounts: []
targets:
  auto_add_enabled: true
  auto_add_max_per_day: 6
  auto_add_min_followers: 0
  follow_from_mentions_enabled: true
  follow_from_mentions_max_per_session: 3
  follow_from_small_targets_only: true
  follow_from_home_enabled: true
  follow_from_home_max_per_session: 2
content_topics:
- building in public
- indie hacking
- solopreneurship
- design systems
- UI UX
- AI tools for builders
- SaaS growth
- landing page design
- marketing for indie hackers
content_strategy:
  voice_pillars:
  - product mechanics
  - distribution experiments
  - design systems
  - founder psychology
  - ops simplification
  proof_bank:
  - Dropped onboarding from 7 steps to 3 and activation rose 18% in 2 weeks.
  - Cut 5 features, shipped 1, conversion moved from 1.6% to 2.4%.
  - Weekly release notes reduced support tickets by 22%.
  - Chased a vanity metric for 3 hours before finding a tracking bug.
  - 15 minute daily reviews kept scope honest for 6 weeks.
  signature_angles:
  - tradeoffs beat hacks
  - defaults hide cost
  - small loops beat big bets
  - constraint creates clarity
  - boring systems scale
  weekly_direction:
  - tightening invoice creation flow
  - testing a new activation email sequence
  - refactoring pricing page copy
  - reducing time to first value
  - exploring ai assisted categorization
  tweet_templates_enabled: true
  thread_templates_enabled: true
  require_proof: true
  require_specificity: true
  enforce_no_question: true
  enforce_uniqueness: true
  uniqueness_window: 30
  uniqueness_similarity_threshold: 0.35
  max_generation_attempts: 4
mentions:
  tools: []
discovery:
  hashtags:
  - buildinpublic
  - indiehackers
  - saas
  - uiux
  target_profile_sessions_per_day: 2
  reply_from_hashtags: true
  reply_from_home_feed: true
  max_hashtag_replies_per_session: 5
  max_home_replies_per_session: 8
  max_hashtag_tweets_scanned: 60
  max_home_tweets_scanned: 120
  hashtag_top_ratio: 0.4
  profile_like_from_home_enabled: true
  profile_like_profiles_per_session: 2
  profile_like_min_posts: 3
  profile_like_max_posts: 6
  candidate_score_threshold: 0.15
  candidate_min_words: 3
  candidate_min_unique_ratio: 0.2
  thread_topic_min_ratio: 0.1
  thread_quality_min_score: 0.1
  dm_from_hashtags: true
  dm_from_home_feed: true
  relevance_keywords: []
  use_embeddings: true
  embedding_threshold: 0.05
  require_keyword_match: false
  min_likes: 0
  min_replies: 0
  min_retweets: 0
  min_total_engagement: 0
  skip_bait_phrases:
  - giveaway
  - retweet
  - rt
  - follow me
  - drop your
  - comment below
  - like if
  - tag a friend
  repeat_topic_window_hours: 48
  max_topic_repeats: 2
notifications:
  reply_to_mentions: true
  max_reply_notifications_per_session: 3
  follow_welcome_enabled: true
  max_follow_welcomes_per_session: 4
  follow_welcome_like_min_posts: 3
  follow_welcome_like_max_posts: 4
reply_strategy:
  shape_distribution:
    statement: 0.35
    observation: 0.2
    agreement_addition: 0.15
    counterpoint: 0.1
    direct_answer: 0.1
    question: 0.05
    witty: 0.05
  ending_history_window: 20
  question_end_window: 5
  question_end_block_threshold: 2
promotions:
  mentions_per_day: 0
  # Subtle product mentions woven into normal replies when the topic is relevant
  product_reply_enabled: true
  product_reply_max_per_day: 2
  products:
    - name: Dodo Invoice
      url: https://dodoinvoice.com
      description: invoicing tool for freelancers and indie hackers
      trigger_keywords:
        - invoice
        - invoicing
        - billing
        - send invoice
        - client billing
        - freelance billing
        - payment request
        - getting paid
        - collect payment
        - unpaid invoice
        - invoice software
        - invoice tool
    - name: Iconstack
      url: https://iconstack.io
      description: icon library for designers and builders
      trigger_keywords:
        - icons
        - icon pack
        - icon set
        - ui icons
        - icon library
        - icon resource
        - icon component
        - svg icons
        - design assets
        - icon system
vision:
  enabled: true
  model: claude-3-5-sonnet-20241022
  max_images_per_tweet: 2
  max_image_bytes: 2000000
turbo_mode: false

safety:
  max_actions_per_hour: 12
  pause_between_sessions_minutes: 60
  unfollow_non_followers_after_days: 14
  nav_actions_per_session: 6
  idle_scroll_enabled: true
  idle_scroll_interval_minutes: 8
  idle_scroll_scrolls: 2
  never_dm_verified_accounts: true
  stop_on_rate_limit: true
  dynamic_pacing: true
  pacing_multiplier_max: 2.0
  rate_limit_cooldown_minutes: 90
